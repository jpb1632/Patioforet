<body>
  <iframe
    id="app-frame"
    class="app-frame"
    title="양주역 중흥S-클래스"
    src="./static/%ED%94%84%EB%A1%9C%EC%A0%9D%ED%8A%B8/%EB%B6%80%EB%8F%99%EC%82%B0%20(oLWSmCRkmlw6kEpt)/%EC%B2%AB%ED%8E%98%EC%9D%B4%EC%A7%80%20(AdKpMlw6KePt)/%EC%B2%AB%ED%8E%98%EC%9D%B4%EC%A7%80%20(AdKpMlw6KePt).html"
    loading="eager"
    referrerpolicy="strict-origin-when-cross-origin"
    allowfullscreen
  ></iframe>
  <script>
    (function () {
      const baseSrc = "./static/%ED%94%84%EB%A1%9C%EC%A0%9D%ED%8A%B8/%EB%B6%80%EB%8F%99%EC%82%B0%20(oLWSmCRkmlw6kEpt)/%EC%B2%AB%ED%8E%98%EC%9D%B4%EC%A7%80%20(AdKpMlw6KePt)/%EC%B2%AB%ED%8E%98%EC%9D%B4%EC%A7%80%20(AdKpMlw6KePt).html";
      const frame = document.getElementById("app-frame");

      if (!frame) return;

      const clearConsultationHash = () => {
        if (window.location.hash !== "#consultation") return;
        try {
          history.replaceState(null, "", `${window.location.pathname}${window.location.search}`);
        } catch (_) {}
      };

      const scrollFrameToHash = (hash) => {
        if (!hash) return;

        const applyScroll = () => {
          try {
            const frameWindow = frame.contentWindow;
            const frameDocument = frameWindow && frameWindow.document;
            const isConsultationHash = hash === "#consultation";
            const targetSelector = isConsultationHash ? ".properties-N9 .consultation-anchor" : hash;
            const target = frameDocument && (frameDocument.querySelector(targetSelector) || frameDocument.querySelector(hash));
            if (!target) return;

            const rect = target.getBoundingClientRect();
            const absoluteTop = rect.top + frameWindow.scrollY;
            const offset = isConsultationHash
              ? (frameWindow.innerWidth <= 992 ? 96 : 126)
              : (frameWindow.innerWidth <= 992 ? 84 : 116);

            frameWindow.scrollTo({
              top: Math.max(0, absoluteTop - offset),
              behavior: "auto"
            });
          } catch (_) {}
        };

        [40, 180, 420, 900, 1600].forEach((delay) => {
          window.setTimeout(applyScroll, delay);
        });
      };

      const syncFrameHash = () => {
        const hash = window.location.hash || "";
        const nextSrc = hash === "#consultation"
          ? `${baseSrc}?consultation=1`
          : baseSrc;
        if (frame.getAttribute("src") !== nextSrc) {
          frame.setAttribute("src", nextSrc);
        } else {
          scrollFrameToHash(hash);
          if (hash === "#consultation") {
            window.setTimeout(clearConsultationHash, 1200);
          }
        }
      };

      frame.addEventListener("load", () => {
        const hash = window.location.hash || "";
        scrollFrameToHash(hash);
        if (hash === "#consultation") {
          window.setTimeout(clearConsultationHash, 1200);
        }
      });

      syncFrameHash();
      window.addEventListener("hashchange", syncFrameHash);
    })();
  </script>
</body>
