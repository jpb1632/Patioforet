<body>
  <iframe
    id="app-frame"
    class="app-frame"
    title="힐스테이트 양주옥정 파티오포레"
    src="./static/%ED%94%84%EB%A1%9C%EC%A0%9D%ED%8A%B8/%EB%B6%80%EB%8F%99%EC%82%B0%20(oLWSmCRkmlw6kEpt)/%EC%B2%AB%ED%8E%98%EC%9D%B4%EC%A7%80%20(AdKpMlw6KePt)/%EC%B2%AB%ED%8E%98%EC%9D%B4%EC%A7%80%20(AdKpMlw6KePt).html"
    loading="eager"
    referrerpolicy="strict-origin-when-cross-origin"
    allowfullscreen
  ></iframe>
  <script>
    (function () {
      const baseSrc = "./static/%ED%94%84%EB%A1%9C%EC%A0%9D%ED%8A%B8/%EB%B6%80%EB%8F%99%EC%82%B0%20(oLWSmCRkmlw6kEpt)/%EC%B2%AB%ED%8E%98%EC%9D%B4%EC%A7%80%20(AdKpMlw6KePt)/%EC%B2%AB%ED%8E%98%EC%9D%B4%EC%A7%80%20(AdKpMlw6KePt).html";
      const frame = document.getElementById("app-frame");
      if (!frame) return;

      const isConsultationRequest = () => {
        const params = new URLSearchParams(window.location.search);
        return window.location.hash === "#consultation" || params.get("consultation") === "1";
      };

      const clearConsultationState = () => {
        try {
          history.replaceState(null, "", window.location.pathname);
        } catch (_) {}
      };

      const scrollFrameToConsultation = () => {
        const applyScroll = () => {
          try {
            const frameWindow = frame.contentWindow;
            const frameDocument = frameWindow && frameWindow.document;
            const target = frameDocument && frameDocument.querySelector('.properties-N9 .consultation-anchor');
            if (!target) return;

            const rect = target.getBoundingClientRect();
            const absoluteTop = rect.top + frameWindow.scrollY;
            const offset = frameWindow.innerWidth <= 992 ? 110 : 150;

            frameWindow.scrollTo({
              top: Math.max(0, absoluteTop - offset),
              behavior: "auto"
            });
          } catch (_) {}
        };

        [40, 180, 420, 900, 1600].forEach((delay) => {
          window.setTimeout(applyScroll, delay);
        });
      };

      const syncFrameRoute = () => {
        const consultation = isConsultationRequest();
        const nextSrc = consultation ? `${baseSrc}?consultation=1` : baseSrc;

        if (frame.getAttribute("src") !== nextSrc) {
          frame.setAttribute("src", nextSrc);
        } else if (consultation) {
          scrollFrameToConsultation();
          window.setTimeout(clearConsultationState, 800);
        }
      };

      frame.addEventListener("load", () => {
        if (!isConsultationRequest()) return;
        scrollFrameToConsultation();
        window.setTimeout(clearConsultationState, 800);
      });

      syncFrameRoute();
      window.addEventListener("hashchange", syncFrameRoute);
      window.addEventListener("popstate", syncFrameRoute);
    })();
  </script>
</body>
